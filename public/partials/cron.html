<!-- Cron Jobs View Partial -->
<div class="section" id="cron-view-section">
  <style>
    #cron-view-section .cron-view-error {
      color: var(--red);
      font-size: 0.8rem;
      margin-bottom: 8px;
    }
    #cron-view-section .cron-last-status {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    #cron-view-section .cron-status {
      font-size: 0.7rem;
      white-space: nowrap;
    }
    #cron-view-section .cron-status.enabled {
      color: var(--green);
    }
    #cron-view-section .cron-status.disabled {
      color: var(--text-muted);
    }
    #cron-view-section .cron-last-status.ok {
      color: var(--green);
      background: rgba(63, 185, 80, 0.12);
    }
    #cron-view-section .cron-last-status.error {
      color: var(--red);
      background: rgba(248, 81, 73, 0.12);
    }
    #cron-view-section .cron-last-status.unknown {
      color: var(--text-muted);
      background: var(--bg);
    }
    #cron-view-section .cron-badge {
      font-size: 0.65rem;
      padding: 1px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    #cron-view-section .cron-badge.source {
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid rgba(128, 128, 128, 0.3);
    }
    #cron-view-section .cron-filter-empty {
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 12px 4px;
    }
    #cron-view-section [hidden] {
      display: none !important;
    }
    #cron-view-section .cron-actions {
      display: inline-flex;
      gap: 6px;
    }
    #cron-view-section .cron-detail {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px 18px;
    }
    #cron-view-section .cron-detail-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    #cron-view-section .cron-detail-label {
      font-size: 0.64rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    #cron-view-section .cron-detail-value {
      font-size: 0.78rem;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    #cron-view-section .cron-detail-value.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--purple);
    }
    #cron-view-section .cron-action-btn {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
    }
    #cron-view-section .cron-action-btn:hover:not(:disabled) {
      border-color: var(--purple);
      color: var(--text);
    }
    #cron-view-section .cron-action-btn.run:hover:not(:disabled) {
      border-color: var(--green);
      color: var(--green);
    }
    #cron-view-section .cron-action-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }
  </style>
  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">⏰</span>
        <span data-i18n="views.cron.title">Cron Jobs</span>
        <span class="section-count" id="cron-view-count">0</span>
      </div>
      <div class="view-subtitle" data-i18n="views.cron.subtitle">
        Scheduled jobs — schedule, next run, last status
      </div>
    </div>

    <div class="section-filters" id="cron-view-filters">
      <div class="filter-group" data-filter-group="status">
        <span class="filter-label" data-i18n="views.cron.filterStatus">Status:</span>
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="enabled" type="button">✅ Enabled</button>
        <button class="filter-btn" data-filter="disabled" type="button">⏸️ Disabled</button>
      </div>
      <div class="filter-group" data-filter-group="schedule">
        <span class="filter-label" data-i18n="views.cron.filterSchedule">Schedule:</span>
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="frequent" type="button">
          ⚡ Frequent (&lt;1h)
        </button>
        <button class="filter-btn" data-filter="daily" type="button">📅 Daily</button>
        <button class="filter-btn" data-filter="weekly" type="button">📆 Weekly</button>
      </div>
      <div class="filter-group" data-filter-group="source">
        <span class="filter-label" data-i18n="views.cron.filterSource">Source:</span>
        <button class="filter-btn active" data-filter="all" type="button">All</button>
        <button class="filter-btn" data-filter="openclaw" type="button">🦞 OpenClaw</button>
        <button class="filter-btn" data-filter="hermes" type="button">⚡ Hermes</button>
      </div>
      <div class="filter-group" data-filter-group="agent" id="cron-view-agent-filter">
        <span class="filter-label" data-i18n="views.cron.filterAgent">Agent:</span>
        <button class="filter-btn active" data-filter="all" type="button">All</button>
      </div>
    </div>

    <div class="cron-view-error" id="cron-view-error" hidden></div>
    <div class="cron-filter-empty" id="cron-view-filter-empty" hidden></div>

    <!-- Detail list host (built by views/cron.js via the shared component) -->
    <div id="cron-view-list"></div>
  </section>
</div>
