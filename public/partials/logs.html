<!-- Logs (Audit Log) View Partial -->
<div class="section" id="logs-view-section">
  <style>
    #logs-view-section .logs-filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      padding: 12px 14px;
      margin-bottom: 12px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    #logs-view-section .logs-filter-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #logs-view-section .logs-filter-field label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    #logs-view-section .logs-filter-field input,
    #logs-view-section .logs-filter-field select {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 0.85rem;
      font-family: inherit;
      min-width: 130px;
      color-scheme: dark;
    }
    #logs-view-section .logs-filter-field input:focus,
    #logs-view-section .logs-filter-field select:focus {
      outline: none;
      border-color: var(--accent-2);
    }
    #logs-view-section .logs-filter-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    #logs-view-section .logs-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    #logs-view-section .logs-error {
      color: var(--red);
    }
    #logs-view-section .logs-table {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-bg);
    }
    #logs-view-section .logs-table-head,
    #logs-view-section .logs-row-main {
      display: grid;
      grid-template-columns: 130px 200px 150px 1fr 28px;
      gap: 10px;
      align-items: center;
      padding: 8px 12px;
    }
    #logs-view-section .logs-table-head {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--card-hover);
    }
    #logs-view-section .logs-row {
      border-bottom: 1px solid var(--border);
    }
    #logs-view-section .logs-row:last-child {
      border-bottom: none;
    }
    #logs-view-section .logs-row-main {
      cursor: pointer;
      transition: background 0.1s ease;
    }
    #logs-view-section .logs-row-main:hover {
      background: var(--card-hover);
    }
    #logs-view-section .logs-time {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    #logs-view-section .logs-user-chip {
      display: inline-block;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(var(--accent-2-rgb), 0.1);
      border: 1px solid rgba(var(--accent-2-rgb), 0.3);
      color: var(--accent-2);
    }
    #logs-view-section .logs-action-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid;
      white-space: nowrap;
    }
    #logs-view-section .logs-action-task {
      color: var(--accent);
      border-color: rgba(var(--accent-rgb), 0.4);
      background: rgba(var(--accent-rgb), 0.08);
    }
    #logs-view-section .logs-action-brief {
      color: var(--accent-2);
      border-color: rgba(var(--accent-2-rgb), 0.4);
      background: rgba(var(--accent-2-rgb), 0.08);
    }
    #logs-view-section .logs-action-lesson {
      color: #a371f7;
      border-color: rgba(163, 113, 247, 0.4);
      background: rgba(163, 113, 247, 0.08);
    }
    #logs-view-section .logs-action-gate {
      color: #ffb224;
      border-color: rgba(255, 178, 36, 0.4);
      background: rgba(255, 178, 36, 0.08);
    }
    #logs-view-section .logs-action-node {
      color: #58a6ff;
      border-color: rgba(88, 166, 255, 0.4);
      background: rgba(88, 166, 255, 0.08);
    }
    #logs-view-section .logs-action-alerts {
      color: #db6d28;
      border-color: rgba(219, 109, 40, 0.4);
      background: rgba(219, 109, 40, 0.08);
    }
    #logs-view-section .logs-action-memory {
      color: #f778ba;
      border-color: rgba(247, 120, 186, 0.4);
      background: rgba(247, 120, 186, 0.08);
    }
    #logs-view-section .logs-target {
      font-size: 0.82rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #logs-view-section .logs-target-empty {
      color: var(--text-muted);
    }
    #logs-view-section .logs-caret {
      color: var(--text-muted);
      font-size: 0.7rem;
      text-align: center;
      transition: transform 0.15s ease;
    }
    #logs-view-section .logs-row.expanded .logs-caret {
      transform: rotate(90deg);
      color: var(--accent);
    }
    #logs-view-section .logs-detail {
      display: none;
      padding: 0 12px 10px 152px;
    }
    #logs-view-section .logs-row.expanded .logs-detail {
      display: block;
    }
    #logs-view-section .logs-detail pre {
      margin: 0;
      padding: 10px;
      font-size: 0.75rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #logs-view-section .logs-pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    @media (max-width: 900px) {
      #logs-view-section .logs-table-head {
        display: none;
      }
      #logs-view-section .logs-row-main {
        grid-template-columns: 1fr 1fr;
      }
      #logs-view-section .logs-detail {
        padding: 0 12px 10px 12px;
      }
    }
  </style>
  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">📜</span>
        <span data-i18n="views.logs.title">Audit Logs</span>
      </div>
      <div class="view-subtitle" data-i18n="views.logs.subtitle">
        Immutable trail of every action taken by the fleet and its operators
      </div>
    </div>

    <div class="logs-filter-bar" id="logs-filter-bar">
      <div class="logs-filter-field">
        <label for="logs-filter-user" data-i18n="views.logs.filterUser">User</label>
        <input
          type="text"
          id="logs-filter-user"
          placeholder="user@tailnet"
          autocomplete="off"
          list="logs-actor-options"
        />
        <!-- Actor suggestions populated by logs.js from the entries present -->
        <datalist id="logs-actor-options"></datalist>
      </div>
      <div class="logs-filter-field">
        <label for="logs-filter-action" data-i18n="views.logs.filterAction">Action</label>
        <!-- Options after "All actions" are populated dynamically by logs.js
             from the actions present in the trail (not hardcoded). -->
        <select id="logs-filter-action">
          <option value="" data-i18n="views.logs.allActions">All actions</option>
        </select>
      </div>
      <div class="logs-filter-field">
        <!-- Label text set by logs.js via t() (key not in en.json yet) -->
        <label for="logs-filter-search" id="logs-filter-search-label">Search</label>
        <input type="text" id="logs-filter-search" placeholder="free text…" autocomplete="off" />
      </div>
      <div class="logs-filter-field">
        <label for="logs-filter-since" data-i18n="views.logs.filterSince">Since</label>
        <input type="date" id="logs-filter-since" />
      </div>
      <div class="logs-filter-field">
        <label for="logs-filter-until" data-i18n="views.logs.filterUntil">Until</label>
        <input type="date" id="logs-filter-until" />
      </div>
      <div class="logs-filter-field">
        <label for="logs-filter-limit" data-i18n="views.logs.filterLimit">Limit</label>
        <select id="logs-filter-limit">
          <option value="50">50</option>
          <option value="200" selected>200</option>
          <option value="500">500</option>
          <option value="1000">1000</option>
        </select>
      </div>
      <div class="logs-filter-actions">
        <button
          class="btn-secondary"
          id="logs-export-btn"
          type="button"
          data-i18n="views.logs.exportBtn"
        >
          Export view
        </button>
        <button
          class="btn-primary"
          id="logs-refresh-btn"
          type="button"
          data-i18n="views.logs.refreshBtn"
        >
          Refresh
        </button>
      </div>
    </div>

    <div class="logs-meta-row">
      <!-- count line is owned by logs.js (views.logs.countOne/countMany) -->
      <span id="logs-count-line">0 entries shown</span>
      <span class="logs-error" id="logs-error" hidden></span>
    </div>

    <div class="logs-table" id="logs-table" hidden>
      <div class="logs-table-head">
        <span data-i18n="views.logs.colTime">Time</span>
        <span data-i18n="views.logs.colUser">User</span>
        <span data-i18n="views.logs.colAction">Action</span>
        <span data-i18n="views.logs.colTarget">Target</span>
        <span></span>
      </div>
      <div id="logs-rows"></div>
    </div>

    <!-- Pagination over the filtered result set (labels set by logs.js) -->
    <div class="logs-pagination" id="logs-pagination" hidden>
      <button class="btn-secondary" id="logs-page-prev" type="button">← Prev</button>
      <span id="logs-page-info">Page 1 / 1</span>
      <button class="btn-secondary" id="logs-page-next" type="button">Next →</button>
    </div>

    <div class="empty-state" id="logs-empty-state">
      <div class="empty-state-icon">📜</div>
      <div class="empty-state-title" data-i18n="views.logs.emptyTitle">No audit entries yet</div>
      <p class="empty-state-text" data-i18n="views.logs.emptyText">
        Every command, mutation, and agent action will be recorded here as soon as the fleet starts
        acting.
      </p>
      <button
        class="btn-primary empty-state-cta"
        id="logs-empty-refresh"
        data-i18n="views.logs.cta"
      >
        Refresh the log →
      </button>
    </div>
  </section>
</div>
