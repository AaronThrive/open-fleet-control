<div class="section" id="fleet-chat-view-section">

        id="fc-filter-sender"

        spellcheck="false"
      />
      <input
        type="text"
        class="fc-filter-receiver"
        id="fc-filter-receiver"
        placeholder="Receiver"
        autocomplete="off"
        spellcheck="false"
      />
      <input
        type="text"
        class="fc-filter-text"
        id="fc-filter-text"
        placeholder="Search message text…"
        autocomplete="off"
        spellcheck="false"
      />

      </select>
      <span class="fc-live-badge" id="fc-live-badge">LIVE</span>

    <div class="fc-console-wrap" id="fc-console-wrap" hidden>

      </p>
    </div>
  </section>
