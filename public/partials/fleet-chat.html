<!-- Fleet Chat View Partial -->
<div class="section" id="fleet-chat-view-section">
  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">💬</span>
        <span data-i18n="views.fleetChat.title">Fleet Chat</span>
      </div>
      <div class="view-subtitle" data-i18n="views.fleetChat.subtitle">
        Broadcast channel between you and every agent in the fleet
      </div>
    </div>
    <div class="empty-state" id="fleet-chat-empty-state">
      <div class="empty-state-icon">💬</div>
      <div class="empty-state-title" data-i18n="views.fleetChat.emptyTitle">
        No fleet messages yet
      </div>
      <p class="empty-state-text" data-i18n="views.fleetChat.emptyText">
        When agents report in or you broadcast an order, the conversation will appear here.
      </p>
      <button class="btn-primary empty-state-cta" data-i18n="views.fleetChat.cta">
        Send your first broadcast →
      </button>
    </div>
  </section>
</div>
