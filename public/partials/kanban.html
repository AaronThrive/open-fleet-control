<!-- Kanban View Partial -->
<div class="section" id="kanban-view-section">
  <style>
    /* Explicit display rules below would defeat the `hidden` attribute */
    #kanban-view-section [hidden] {
      display: none !important;
    }

    /* ---- Kanban board ---- */
    .kb-board {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex: 1;
      overflow-x: auto;
      padding: 16px 2px 8px;
    }
    .kb-col {
      flex: 0 0 234px;
      min-width: 234px;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border: 1px solid var(--border);
      border-top: 2px solid var(--kb-col-accent, var(--border));
      border-radius: 10px;
      max-height: 72vh;
    }
    .kb-col[data-status="inbox"] {
      --kb-col-accent: var(--text-muted);
    }
    .kb-col[data-status="assigned"] {
      --kb-col-accent: var(--accent-2);
    }
    .kb-col[data-status="inprogress"] {
      --kb-col-accent: var(--accent);
    }
    .kb-col[data-status="review"] {
      --kb-col-accent: var(--purple);
    }
    .kb-col[data-status="done"] {
      --kb-col-accent: rgba(var(--accent-rgb), 0.45);
    }
    .kb-col[data-status="failed"] {
      --kb-col-accent: var(--red);
      border-color: rgba(248, 81, 73, 0.45);
    }
    .kb-col-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }
    .kb-col-name {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--kb-col-accent, var(--text));
    }
    .kb-col[data-status="done"] .kb-col-name {
      color: rgba(var(--accent-rgb), 0.6);
    }
    .kb-count {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 1px 8px;
      min-width: 24px;
      text-align: center;
    }
    .kb-col[data-status="failed"] .kb-count {
      color: var(--red);
      border-color: rgba(248, 81, 73, 0.45);
    }
    .kb-add-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .kb-add-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ---- Inline new-task form ---- */
    .kb-newform {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 10px 0;
    }
    .kb-newform[hidden] {
      display: none;
    }
    .kb-newform input {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 6px 8px;
      width: 100%;
      box-sizing: border-box;
    }
    .kb-newform input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .kb-newform-actions {
      display: flex;
      gap: 6px;
    }
    .kb-newform-actions button {
      flex: 1;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 0;
      cursor: pointer;
    }
    .kb-newform-add {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: var(--on-accent);
    }
    .kb-newform-cancel {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* ---- Card list + cards ---- */
    .kb-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      overflow-y: auto;
      min-height: 60px;
      flex: 1;
    }
    .kb-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      cursor: grab;
    }
    .kb-card:hover {
      background: var(--card-hover);
      border-color: rgba(var(--accent-rgb), 0.4);
    }
    .kb-card.sortable-ghost {
      opacity: 0.4;
      border: 1px dashed var(--accent);
    }
    .kb-card.sortable-drag {
      cursor: grabbing;
    }
    /* ---- Keyboard accessibility: visible focus + move mode ---- */
    .kb-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-color: rgba(var(--accent-rgb), 0.55);
    }
    .kb-card.kb-move-mode,
    .kb-card.kb-move-mode:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-color: var(--accent);
      box-shadow: 0 0 14px rgba(var(--accent-rgb), 0.55);
    }
    .kb-add-btn:focus-visible,
    .kb-newform-actions button:focus-visible,
    .kb-drawer-close:focus-visible,
    .kb-comment-submit:focus-visible,
    .kb-delete-btn:focus-visible,
    .kb-move-btn:focus-visible,
    .kb-field input:focus-visible,
    .kb-field select:focus-visible,
    .kb-field textarea:focus-visible,
    .kb-comment-form input:focus-visible,
    .kb-comment-form textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .kb-move-hint {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.08);
      border: 1px solid rgba(var(--accent-rgb), 0.4);
      border-radius: 6px;
      padding: 5px 10px;
      margin: 6px 2px 0;
    }
    .kb-kbd-hint {
      font-size: 0.68rem;
      color: var(--text-muted);
      padding: 6px 2px 2px;
      letter-spacing: 0.02em;
    }
    .kb-kbd-hint kbd {
      font-family: monospace;
      color: var(--accent-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 4px;
    }
    .kb-move-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .kb-move-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 9px;
      white-space: nowrap;
    }
    .kb-move-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .kb-move-btn:disabled {
      opacity: 0.45;
      cursor: default;
      border-style: dashed;
    }
    .kb-visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      border: 0;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }
    .kb-col[data-status="done"] .kb-card {
      opacity: 0.55;
    }
    .kb-col[data-status="failed"] .kb-card {
      border-left: 2px solid var(--red);
    }
    .kb-card-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      word-break: break-word;
    }
    .kb-card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }
    .kb-badge {
      font-size: 0.66rem;
      font-weight: 600;
      border-radius: 999px;
      padding: 1px 7px;
      white-space: nowrap;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .kb-badge-assignee {
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.12);
      border: 1px solid rgba(var(--accent-rgb), 0.35);
    }
    .kb-badge-node {
      color: var(--accent-2);
      background: rgba(var(--accent-2-rgb), 0.1);
      border: 1px solid rgba(var(--accent-2-rgb), 0.35);
    }
    .kb-badge-stale {
      color: var(--yellow);
      background: rgba(255, 178, 36, 0.12);
      border: 1px solid rgba(255, 178, 36, 0.5);
      animation: kb-stale-pulse 1.6s ease-in-out infinite;
    }
    @keyframes kb-stale-pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.45;
      }
    }
    .kb-prio {
      font-size: 0.66rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 1px 5px;
    }
    .kb-prio-1 {
      color: var(--red);
      border: 1px solid rgba(248, 81, 73, 0.55);
      background: rgba(248, 81, 73, 0.12);
    }
    .kb-prio-2 {
      color: var(--yellow);
      border: 1px solid rgba(255, 178, 36, 0.5);
      background: rgba(255, 178, 36, 0.1);
    }
    .kb-prio-3 {
      color: var(--text-muted);
      border: 1px solid var(--border);
      background: transparent;
    }
    .kb-due {
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .kb-due.kb-overdue {
      color: var(--red);
      font-weight: 600;
    }
    .kb-progress {
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }
    .kb-progress-fill {
      height: 100%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(var(--accent-rgb), 0.7);
      border-radius: 2px;
    }
    .kb-card-meta {
      display: flex;
      gap: 10px;
      font-size: 0.66rem;
      color: var(--text-muted);
    }

    /* ---- Loading ---- */
    .kb-loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ---- Detail drawer ---- */
    .kb-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 1000;
    }
    .kb-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 400px;
      max-width: 92vw;
      background: var(--card-bg);
      border-left: 1px solid var(--border);
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 20px;
      overflow-y: auto;
      box-shadow: -8px 0 24px rgba(0, 0, 0, 0.45);
      animation: kb-drawer-in 0.2s ease;
    }
    @keyframes kb-drawer-in {
      from {
        transform: translateX(40px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    .kb-drawer-head {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .kb-drawer-id {
      font-family: monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .kb-drawer-close {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.85rem;
      line-height: 1;
      padding: 4px 9px;
    }
    .kb-drawer-close:hover {
      border-color: var(--red);
      color: var(--red);
    }
    .kb-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kb-field label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .kb-field input,
    .kb-field select,
    .kb-field textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      padding: 6px 8px;
      font-family: inherit;
      width: 100%;
      box-sizing: border-box;
    }
    .kb-field input:focus,
    .kb-field select:focus,
    .kb-field textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .kb-field textarea {
      min-height: 84px;
      resize: vertical;
    }
    .kb-field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .kb-section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-2);
      border-bottom: 1px solid var(--border);
      padding-bottom: 5px;
      margin-top: 4px;
    }
    .kb-attempts,
    .kb-comments {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .kb-attempt,
    .kb-comment {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font-size: 0.74rem;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .kb-attempt-head,
    .kb-comment-head {
      display: flex;
      gap: 8px;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .kb-attempt-agent,
    .kb-comment-author {
      font-weight: 600;
      color: var(--accent-2);
    }
    .kb-attempt-result-success {
      color: var(--accent);
      font-weight: 600;
    }
    .kb-attempt-result-failure {
      color: var(--red);
      font-weight: 600;
    }
    .kb-attempt-branch {
      font-family: monospace;
      color: var(--text-muted);
    }
    .kb-ts {
      margin-left: auto;
      font-size: 0.66rem;
      color: var(--text-muted);
    }
    .kb-muted {
      color: var(--text-muted);
      font-size: 0.74rem;
    }
    .kb-comment-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .kb-comment-form input,
    .kb-comment-form textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.78rem;
      padding: 6px 8px;
      font-family: inherit;
      width: 100%;
      box-sizing: border-box;
    }
    .kb-comment-form textarea {
      min-height: 56px;
      resize: vertical;
    }
    .kb-comment-form input:focus,
    .kb-comment-form textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .kb-comment-submit {
      align-self: flex-end;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--on-accent);
      cursor: pointer;
      font-size: 0.74rem;
      font-weight: 600;
      padding: 5px 14px;
    }
    .kb-delete-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px solid rgba(248, 81, 73, 0.55);
      border-radius: 6px;
      color: var(--red);
      cursor: pointer;
      font-size: 0.76rem;
      font-weight: 600;
      padding: 7px 0;
    }
    .kb-delete-btn:hover {
      background: rgba(248, 81, 73, 0.12);
    }
  </style>

  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">📋</span>
        <span data-i18n="views.kanban.title">Kanban</span>
      </div>
      <div class="view-subtitle" data-i18n="views.kanban.subtitle">
        Task board for work assigned to the swarm
      </div>
    </div>

    <div class="kb-loading" id="kb-loading" data-i18n="views.kanban.loading">Loading board...</div>

    <div class="empty-state" id="kanban-empty-state" hidden>
      <div class="empty-state-icon">📋</div>
      <div class="empty-state-title" data-i18n="views.kanban.emptyTitle">No tasks on the board</div>
      <p class="empty-state-text" data-i18n="views.kanban.emptyText">
        Queue work for your agents and track it from backlog to done.
      </p>
      <button class="btn-primary empty-state-cta" id="kb-empty-cta" data-i18n="views.kanban.cta">
        Create your first task →
      </button>
    </div>

    <div class="kb-board" id="kanban-board" hidden></div>
    <div class="kb-move-hint" id="kb-move-hint" hidden></div>
    <div class="kb-kbd-hint" id="kb-kbd-hint" hidden>
      <kbd>Tab</kbd><span data-i18n="views.kanban.kbdNavigate">: navigate</span> · <kbd>M</kbd
      ><span data-i18n="views.kanban.kbdMoveMode">: move mode</span> · <kbd>Arrows</kbd
      ><span data-i18n="views.kanban.kbdMove">: move</span> · <kbd>Enter</kbd
      ><span data-i18n="views.kanban.kbdConfirm">: confirm</span> · <kbd>Esc</kbd
      ><span data-i18n="views.kanban.kbdCancel">: cancel</span>
    </div>
    <div class="kb-visually-hidden" id="kb-live" aria-live="polite" role="status"></div>
  </section>

  <div class="kb-backdrop" id="kb-backdrop" hidden></div>
  <aside
    class="kb-drawer"
    id="kb-drawer"
    role="dialog"
    aria-modal="true"
    aria-label="Task details"
    data-i18n-aria-label="views.kanban.drawerAria"
    hidden
  >
    <div class="kb-drawer-head">
      <span class="kb-drawer-id" id="kb-drawer-id"></span>
      <button
        class="kb-drawer-close"
        id="kb-drawer-close"
        title="Close"
        data-i18n-title="views.kanban.close"
      >
        ✕
      </button>
    </div>

    <div class="kb-field">
      <label for="kb-f-title" data-i18n="views.kanban.fieldTitle">Title</label>
      <input id="kb-f-title" data-field="title" type="text" maxlength="200" />
    </div>
    <div class="kb-field">
      <label for="kb-f-description" data-i18n="views.kanban.fieldDescription">Description</label>
      <textarea id="kb-f-description" data-field="description"></textarea>
    </div>
    <div class="kb-field">
      <label id="kb-move-row-label" data-i18n="views.kanban.moveToColumn">Move to column</label>
      <div
        class="kb-move-row"
        id="kb-move-row"
        role="group"
        aria-labelledby="kb-move-row-label"
      ></div>
    </div>
    <div class="kb-field-grid">
      <div class="kb-field">
        <label for="kb-f-status" data-i18n="views.kanban.fieldStatus">Status</label>
        <select id="kb-f-status" data-field="status">
          <option value="inbox" data-i18n="views.kanban.columns.inbox">Inbox</option>
          <option value="assigned" data-i18n="views.kanban.columns.assigned">Assigned</option>
          <option value="inprogress" data-i18n="views.kanban.columns.inprogress">
            In Progress
          </option>
          <option value="review" data-i18n="views.kanban.columns.review">Review</option>
          <option value="done" data-i18n="views.kanban.columns.done">Done</option>
          <option value="failed" data-i18n="views.kanban.columns.failed">Failed</option>
        </select>
      </div>
      <div class="kb-field">
        <label for="kb-f-priority" data-i18n="views.kanban.fieldPriority">Priority</label>
        <select id="kb-f-priority" data-field="priority">
          <option value="1" data-i18n="views.kanban.prio1">P1 — Critical</option>
          <option value="2" data-i18n="views.kanban.prio2">P2 — Normal</option>
          <option value="3" data-i18n="views.kanban.prio3">P3 — Low</option>
        </select>
      </div>
      <div class="kb-field">
        <label for="kb-f-assignee" data-i18n="views.kanban.fieldAssignee">Assignee</label>
        <input id="kb-f-assignee" data-field="assignee" type="text" maxlength="128" />
      </div>
      <div class="kb-field">
        <label for="kb-f-node" data-i18n="views.kanban.fieldNode">Node</label>
        <input id="kb-f-node" data-field="node" type="text" maxlength="128" />
      </div>
      <div class="kb-field">
        <label for="kb-f-due" data-i18n="views.kanban.fieldDue">Due</label>
        <input id="kb-f-due" data-field="due" type="date" />
      </div>
      <div class="kb-field">
        <label for="kb-f-progress" data-i18n="views.kanban.fieldProgress">Progress %</label>
        <input id="kb-f-progress" data-field="progress" type="number" min="0" max="100" step="1" />
      </div>
    </div>

    <div class="kb-section-title" data-i18n="views.kanban.attempts">Attempts</div>
    <div class="kb-attempts" id="kb-attempts"></div>

    <div class="kb-section-title" data-i18n="views.kanban.comments">Comments</div>
    <div class="kb-comments" id="kb-comments"></div>
    <div class="kb-comment-form">
      <input
        id="kb-comment-author"
        type="text"
        placeholder="Author"
        data-i18n-placeholder="views.kanban.authorPlaceholder"
        value="operator"
      />
      <textarea
        id="kb-comment-text"
        placeholder="Add a comment..."
        data-i18n-placeholder="views.kanban.commentPlaceholder"
      ></textarea>
      <button class="kb-comment-submit" id="kb-comment-submit" data-i18n="views.kanban.addComment">
        Add Comment
      </button>
    </div>

    <button class="kb-delete-btn" id="kb-delete" data-i18n="views.kanban.deleteTask">
      Delete Task
    </button>
  </aside>
</div>
