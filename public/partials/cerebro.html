<!-- Cerebro View Partial -->
<div class="section" id="cerebro-view-section">
  <style>
    #cerebro-view-section [hidden] {
      display: none !important;
    }
    #cerebro-view-section .cerebro-view-error {
      color: var(--red);
      font-size: 0.8rem;
      margin-bottom: 8px;
    }
    #cerebro-view-section .cerebro-stats-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }
    #cerebro-view-section .cerebro-stat strong {
      color: var(--text);
      font-weight: 700;
      margin-right: 4px;
    }
    #cerebro-view-section .cerebro-stat.active strong {
      color: var(--green);
    }
    #cerebro-view-section .cerebro-stat.resolved strong {
      color: var(--accent);
    }
    #cerebro-view-section .cerebro-stat.orphans strong {
      color: var(--yellow);
    }
    #cerebro-view-section .cerebro-status-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    #cerebro-view-section .cerebro-status-badge.active {
      color: var(--green);
      background: rgba(63, 185, 80, 0.12);
    }
    #cerebro-view-section .cerebro-status-badge.resolved {
      color: var(--accent);
      background: rgba(88, 166, 255, 0.12);
    }
    #cerebro-view-section .cerebro-status-badge.parked {
      color: var(--text-muted);
      background: var(--bg);
    }
    #cerebro-view-section .cerebro-topic-action {
      font-size: 0.7rem;
      padding: 3px 8px;
      margin-left: 4px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
    }
    #cerebro-view-section .cerebro-topic-action:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--text);
    }
    #cerebro-view-section .cerebro-topic-action:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    #cerebro-view-section .cerebro-not-initialized {
      text-align: center;
      padding: 40px 20px;
    }
    #cerebro-view-section .cerebro-init-commands {
      background: var(--bg);
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      font-size: 0.8rem;
      font-family: monospace;
      max-width: 480px;
      margin: 0 auto;
    }
    #cerebro-view-section .cerebro-init-commands .cmd {
      color: var(--accent);
    }
    #cerebro-view-section .cerebro-detail-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 16px;
      font-size: 0.78rem;
    }
    #cerebro-view-section .cerebro-detail-grid dt {
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      align-self: center;
    }
    #cerebro-view-section .cerebro-detail-grid dd {
      margin: 0;
      color: var(--text);
      word-break: break-word;
    }
  </style>
  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">🔮</span>
        <span data-i18n="views.cerebro.title">Cerebro</span>
        <span class="section-count" id="cerebro-view-count">0</span>
      </div>
      <div class="view-subtitle" data-i18n="views.cerebro.subtitle">
        Conversation topics tracked across sessions — status, threads, freshness
      </div>
    </div>

    <div class="cerebro-view-error" id="cerebro-view-error" hidden></div>

    <!-- Not initialized fallback -->
    <div class="vitals-panel cerebro-not-initialized" id="cerebro-view-not-initialized" hidden>
      <div style="font-size: 3rem; margin-bottom: 16px">🔮</div>
      <h3
        style="font-size: 1.2rem; font-weight: 600; margin-bottom: 8px"
        data-i18n="views.cerebro.notInitTitle"
      >
        Cerebro Not Initialized
      </h3>
      <p
        style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px"
        data-i18n="views.cerebro.notInitHint"
      >
        Cerebro tracks conversation topics and threads across sessions.
      </p>
      <div class="cerebro-init-commands">
        <div style="color: var(--text-muted); margin-bottom: 8px" data-i18n="views.cerebro.initHow">
          # To initialize Cerebro:
        </div>
        <div class="cmd" id="cerebro-view-init-topics-cmd">mkdir -p ~/cerebro/topics</div>
        <div class="cmd" id="cerebro-view-init-orphans-cmd">mkdir -p ~/cerebro/orphans</div>
      </div>
    </div>

    <!-- Initialized: stats strip + topic detail list -->
    <div id="cerebro-view-initialized" hidden>
      <div class="cerebro-stats-strip" id="cerebro-view-stats">
        <span class="cerebro-stat active"
          ><strong id="cerebro-view-active">0</strong
          ><span data-i18n="views.cerebro.statActive">active</span></span
        >
        <span class="cerebro-stat resolved"
          ><strong id="cerebro-view-resolved">0</strong
          ><span data-i18n="views.cerebro.statResolved">resolved</span></span
        >
        <span class="cerebro-stat"
          ><strong id="cerebro-view-parked">0</strong
          ><span data-i18n="views.cerebro.statParked">parked</span></span
        >
        <span class="cerebro-stat"
          ><strong id="cerebro-view-threads">0</strong
          ><span data-i18n="views.cerebro.statThreads">threads</span></span
        >
        <span class="cerebro-stat orphans"
          ><strong id="cerebro-view-orphans">0</strong
          ><span data-i18n="views.cerebro.statOrphans">orphans</span></span
        >
        <span class="cerebro-stat" id="cerebro-view-updated"></span>
      </div>
      <div id="cerebro-view-list"></div>
    </div>
  </section>
</div>
