<!-- Mesh View Partial -->
<div class="section" id="mesh-view-section">
  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">🕸️</span>
        <span data-i18n="views.mesh.title">Mesh</span>
      </div>
      <div class="view-subtitle" data-i18n="views.mesh.subtitle">
        Fleet node topology, reachability, and health across your tailnet
      </div>
    </div>
    <div class="empty-state" id="mesh-empty-state">
      <div class="empty-state-icon">🕸️</div>
      <div class="empty-state-title" data-i18n="views.mesh.emptyTitle">No nodes registered</div>
      <p class="empty-state-text" data-i18n="views.mesh.emptyText">
        The hive has no nodes yet. Once nodes join the mesh, their topology and health will appear
        here in real time.
      </p>
      <button class="btn-primary empty-state-cta" data-i18n="views.mesh.cta">
        Discover nodes on your tailnet →
      </button>
    </div>
  </section>
</div>
