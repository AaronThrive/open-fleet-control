<!-- Cortex View Partial -->
<div class="section" id="cortex-view-section">
  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">🧩</span>
        <span data-i18n="views.cortex.title">Cortex</span>
      </div>
      <div class="view-subtitle" data-i18n="views.cortex.subtitle">
        Shared knowledge base the whole fleet can read and write
      </div>
    </div>
    <div class="empty-state" id="cortex-empty-state">
      <div class="empty-state-icon">🧩</div>
      <div class="empty-state-title" data-i18n="views.cortex.emptyTitle">Cortex is empty</div>
      <p class="empty-state-text" data-i18n="views.cortex.emptyText">
        No knowledge has been ingested yet. Feed the Cortex documents, notes, and lessons so every
        agent shares the same brain.
      </p>
      <button class="btn-primary empty-state-cta" data-i18n="views.cortex.cta">
        Ingest knowledge →
      </button>
    </div>
  </section>
</div>
