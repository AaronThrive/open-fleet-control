<!-- Cortex View Partial -->
<div class="section" id="cortex-view-section">
  <style>
    /* ---------------------------------------------------------------- */
    /* Cortex panel — scoped under #cortex-view-section                  */
    /* ---------------------------------------------------------------- */
    #cortex-view-section {
      --cx-accent: var(--accent, #00ff66);
      --cx-accent-2: var(--accent-2, #0df5e3);
      --cx-card: rgba(255, 255, 255, 0.025);
      --cx-border: var(--border, #232833);
      --cx-muted: var(--text-muted, #9aa4b2);
    }

    /* Availability strip ---------------------------------------------- */
    #cortex-view-section .cx-avail-strip {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 10px 14px;
      margin-bottom: 16px;
      border: 1px solid var(--cx-border);
      border-radius: 10px;
      background: var(--cx-card);
      font-size: 0.78rem;
    }
    #cortex-view-section .cx-avail-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--cx-muted);
    }
    #cortex-view-section .cx-avail-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #555c68;
      flex: none;
    }
    #cortex-view-section .cx-avail-dot.up {
      background: var(--cx-accent);
      box-shadow: 0 0 7px rgba(0, 255, 102, 0.7);
    }
    #cortex-view-section .cx-avail-dot.down {
      background: #f85149;
      box-shadow: 0 0 6px rgba(248, 81, 73, 0.55);
    }
    #cortex-view-section .cx-avail-label {
      color: var(--text, #fff);
      font-weight: 600;
    }
    #cortex-view-section .cx-avail-state {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.68rem;
    }

    /* Active context engine strip --------------------------------------- */
    #cortex-view-section .cx-engine-strip {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 14px;
      margin-bottom: 14px;
      border: 1px solid var(--cx-border);
      border-left: 3px solid var(--cx-accent-2);
      border-radius: 10px;
      background: var(--cx-card);
      font-size: 0.74rem;
      color: var(--cx-muted);
    }
    #cortex-view-section .cx-engine-strip b {
      color: var(--cx-accent);
      font-weight: 700;
    }

    /* Engine date-window control ---------------------------------------- */
    #cortex-view-section .cx-engine-window {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 16px;
      margin-bottom: 14px;
    }
    #cortex-view-section .cx-window-range {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 0.74rem;
      color: var(--cx-muted);
    }
    #cortex-view-section .cx-window-range-label {
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 0.66rem;
      color: var(--cx-muted);
    }
    #cortex-view-section .cx-window-date {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--cx-border);
      border-radius: 8px;
      color: var(--text, #fff);
      font-size: 0.76rem;
      padding: 5px 8px;
      outline: none;
      color-scheme: dark;
    }
    #cortex-view-section .cx-window-date:focus {
      border-color: var(--cx-accent-2);
      box-shadow: 0 0 0 2px rgba(13, 245, 227, 0.12);
    }
    #cortex-view-section .cx-window-status {
      font-size: 0.72rem;
      color: var(--cx-accent-2);
      font-variant-numeric: tabular-nums;
    }
    #cortex-view-section .cx-window-status:empty {
      display: none;
    }

    /* Engine card badges + purpose-built bodies -------------------------- */
    #cortex-view-section .cx-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex: none;
    }
    #cortex-view-section .cx-badge.live {
      border: 1px solid rgba(0, 255, 102, 0.45);
      color: var(--cx-accent);
      background: rgba(0, 255, 102, 0.08);
    }
    #cortex-view-section .cx-badge.hist {
      border: 1px solid rgba(227, 179, 65, 0.5);
      color: #e3b341;
      background: rgba(227, 179, 65, 0.08);
    }
    #cortex-view-section .cx-badge.stale {
      border: 1px solid rgba(248, 81, 73, 0.5);
      color: #f8a3a0;
      background: rgba(248, 81, 73, 0.08);
    }
    #cortex-view-section .cx-util-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--cx-muted);
      margin-bottom: 7px;
    }
    #cortex-view-section .cx-util-name {
      width: 72px;
      flex: none;
    }
    #cortex-view-section .cx-util-bar {
      position: relative;
      flex: 1;
      height: 10px;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.07);
      overflow: hidden;
    }
    #cortex-view-section .cx-util-fill {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--cx-accent-2), var(--cx-accent));
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      min-width: 2px;
    }
    #cortex-view-section .cx-util-fill.warn {
      background: linear-gradient(90deg, #e3b341, #f0a832);
    }
    #cortex-view-section .cx-util-fill.hot {
      background: linear-gradient(90deg, #f85149, #ff7b72);
    }
    #cortex-view-section .cx-util-pct {
      width: 44px;
      flex: none;
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--text, #fff);
      font-weight: 600;
    }
    #cortex-view-section .cx-kv {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px 12px;
      font-size: 0.72rem;
      color: var(--cx-muted);
      margin: 9px 0 0;
      font-variant-numeric: tabular-nums;
    }
    #cortex-view-section .cx-kv b {
      color: var(--text, #fff);
      font-weight: 600;
    }
    #cortex-view-section .cx-stat-big {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1;
      color: var(--cx-accent);
      text-shadow: 0 0 14px rgba(0, 255, 102, 0.35);
      font-variant-numeric: tabular-nums;
    }
    #cortex-view-section .cx-stat-big small {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--cx-muted);
      margin-left: 5px;
      letter-spacing: 0.04em;
    }
    #cortex-view-section .cx-eng-line {
      font-size: 0.72rem;
      color: var(--cx-muted);
      line-height: 1.45;
      margin-top: 8px;
      word-break: break-word;
    }
    #cortex-view-section .cx-eng-line.accent {
      color: var(--cx-accent);
    }
    #cortex-view-section .cx-eng-line.warn {
      color: #e3b341;
    }
    #cortex-view-section .cx-top-cmds {
      margin-top: 8px;
      font-size: 0.72rem;
      color: var(--cx-muted);
      font-variant-numeric: tabular-nums;
    }
    #cortex-view-section .cx-top-cmds .cmd {
      color: var(--cx-accent-2);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    /* Fuel gauges row -------------------------------------------------- */
    #cortex-view-section .cx-gauges {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }
    #cortex-view-section .cx-gauge {
      position: relative;
      border: 1px solid var(--cx-border);
      border-radius: 12px;
      background: var(--cx-card);
      padding: 14px 16px 16px;
      overflow: hidden;
    }
    #cortex-view-section .cx-gauge.available {
      border-color: rgba(0, 255, 102, 0.25);
    }
    #cortex-view-section .cx-gauge.unavailable {
      opacity: 0.55;
    }
    #cortex-view-section .cx-gauge-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    #cortex-view-section .cx-gauge-label {
      font-size: 0.74rem;
      color: var(--cx-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #cortex-view-section .cx-gauge-pct {
      font-size: 1.65rem;
      font-weight: 700;
      line-height: 1;
      color: var(--cx-accent);
      text-shadow: 0 0 14px rgba(0, 255, 102, 0.45);
      flex: none;
      font-variant-numeric: tabular-nums;
    }
    #cortex-view-section .cx-gauge-pct.na {
      color: var(--cx-muted);
      text-shadow: none;
      font-size: 1.1rem;
    }
    #cortex-view-section .cx-gauge-pct small {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--cx-muted);
      margin-left: 3px;
      letter-spacing: 0.05em;
    }
    #cortex-view-section .cx-gauge-bar {
      position: relative;
      height: 14px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.07);
      overflow: hidden;
      margin-bottom: 9px;
    }
    #cortex-view-section .cx-gauge-fill {
      position: absolute;
      inset: 0 auto 0 0;
      border-radius: 7px;
      background: linear-gradient(90deg, var(--cx-accent-2), var(--cx-accent));
      box-shadow: 0 0 12px rgba(0, 255, 102, 0.55);
      transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      min-width: 2px;
    }
    #cortex-view-section .cx-gauge-counts {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 0.74rem;
      color: var(--cx-muted);
      font-variant-numeric: tabular-nums;
      margin-bottom: 6px;
    }
    #cortex-view-section .cx-gauge-counts b {
      color: var(--text, #fff);
      font-weight: 600;
    }
    #cortex-view-section .cx-gauge-counts .eff {
      color: var(--cx-accent);
    }
    #cortex-view-section .cx-gauge-detail {
      font-size: 0.72rem;
      color: var(--cx-muted);
      line-height: 1.45;
      word-break: break-word;
    }
    #cortex-view-section .cx-gauge-reason {
      font-size: 0.72rem;
      color: #f8a3a0;
      line-height: 1.45;
      word-break: break-word;
    }

    /* Stacked body: read-only gbrain memory browser ---------------------- */
    #cortex-view-section .cx-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #cortex-view-section .cx-card {
      border: 1px solid var(--cx-border);
      border-radius: 12px;
      background: var(--cx-card);
      padding: 16px;
      min-width: 0;
    }
    #cortex-view-section .cx-card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    #cortex-view-section .cx-card-title .hint {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--cx-muted);
    }

    /* Shared unavailable / status blocks -------------------------------- */
    #cortex-view-section .cx-offline {
      border: 1px dashed rgba(248, 81, 73, 0.45);
      border-radius: 10px;
      padding: 22px 18px;
      text-align: center;
    }
    #cortex-view-section .cx-offline-icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    #cortex-view-section .cx-offline-title {
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8a3a0;
    }
    #cortex-view-section .cx-offline-reason {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      color: var(--cx-muted);
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--cx-border);
      border-radius: 8px;
      padding: 8px 10px;
      margin: 0 auto 10px;
      max-width: 560px;
      word-break: break-word;
      text-align: left;
      white-space: pre-wrap;
    }
    #cortex-view-section .cx-offline-help {
      font-size: 0.78rem;
      color: var(--cx-muted);
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.5;
    }
    #cortex-view-section .cx-loading,
    #cortex-view-section .cx-empty {
      color: var(--cx-muted);
      font-size: 0.8rem;
      padding: 18px 6px;
      text-align: center;
    }

    /* Memory browser ----------------------------------------------------- */
    #cortex-view-section .cx-mem-search {
      width: 100%;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--cx-border);
      border-radius: 8px;
      color: var(--text, #fff);
      font-size: 0.82rem;
      padding: 9px 12px;
      outline: none;
      margin-bottom: 12px;
    }
    #cortex-view-section .cx-mem-search:focus {
      border-color: var(--cx-accent-2);
      box-shadow: 0 0 0 2px rgba(13, 245, 227, 0.12);
    }
    #cortex-view-section .cx-mem-list {
      max-height: 520px;
      overflow-y: auto;
      padding-right: 2px;
    }
    #cortex-view-section .cx-mem-status {
      font-size: 0.72rem;
      color: var(--cx-muted);
      margin-bottom: 8px;
    }
    #cortex-view-section .cx-mem-status:empty {
      display: none;
    }
    #cortex-view-section .cx-mem-item {
      border: 1px solid var(--cx-border);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.18);
    }
    #cortex-view-section .cx-mem-text {
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--text, #fff);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-word;
      cursor: pointer;
    }
    #cortex-view-section .cx-mem-text.expanded {
      display: block;
      -webkit-line-clamp: unset;
    }
    #cortex-view-section .cx-mem-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
      font-size: 0.68rem;
      color: var(--cx-muted);
    }
    #cortex-view-section .cx-chip {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.66rem;
      letter-spacing: 0.03em;
      border: 1px solid rgba(0, 255, 102, 0.35);
      color: var(--cx-accent);
      background: rgba(0, 255, 102, 0.08);
    }
    #cortex-view-section .cx-chip.scope {
      border-color: rgba(13, 245, 227, 0.4);
      color: var(--cx-accent-2);
      background: rgba(13, 245, 227, 0.08);
    }
    #cortex-view-section .cx-imp-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: none;
    }
    #cortex-view-section .cx-mem-time {
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }
    #cortex-view-section .cx-mem-expand {
      background: none;
      border: none;
      color: var(--cx-accent-2);
      font-size: 0.68rem;
      cursor: pointer;
      padding: 0;
      margin-top: 4px;
    }

    /* Expanded read-only page panel ------------------------------------ */
    #cortex-view-section .cx-mem-detail-title {
      font-size: 0.84rem;
      font-weight: 700;
      color: var(--text, #fff);
      margin-bottom: 6px;
      word-break: break-word;
    }

    /* gbrain health badge ----------------------------------------------- */
    #cortex-view-section .cx-health {
      border: 1px solid var(--cx-border);
      border-radius: 12px;
      background: var(--cx-card);
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    #cortex-view-section .cx-health-badge {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    #cortex-view-section .cx-health-badge.up {
      border: 1px solid rgba(0, 255, 102, 0.45);
      color: var(--cx-accent);
      background: rgba(0, 255, 102, 0.08);
    }
    #cortex-view-section .cx-health-badge.warn {
      border: 1px solid rgba(227, 179, 65, 0.5);
      color: #e3b341;
      background: rgba(227, 179, 65, 0.08);
    }
    #cortex-view-section .cx-health-badge.down {
      border: 1px solid rgba(248, 81, 73, 0.5);
      color: #f8a3a0;
      background: rgba(248, 81, 73, 0.08);
    }
    #cortex-view-section .cx-health-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
      flex: none;
      box-shadow: 0 0 8px currentColor;
    }
    #cortex-view-section .cx-health-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      margin-top: 12px;
      font-size: 0.76rem;
      color: var(--cx-muted);
      font-variant-numeric: tabular-nums;
    }
    #cortex-view-section .cx-health-stat b {
      color: var(--text, #fff);
      font-weight: 600;
    }
    #cortex-view-section .cx-health-line {
      font-size: 0.78rem;
      color: var(--cx-muted);
      margin-top: 9px;
      line-height: 1.45;
      word-break: break-word;
    }
    #cortex-view-section .cx-health-line.accent {
      color: var(--cx-accent);
      font-weight: 600;
    }
    #cortex-view-section .cx-health-line.warn {
      color: #e3b341;
      font-weight: 600;
    }

    /* Obsidian ↔ gbrain mirror panel ------------------------------------ */
    #cortex-view-section .cx-mirror-stale {
      border: 1px solid rgba(248, 81, 73, 0.5);
      background: rgba(248, 81, 73, 0.08);
      color: #f8a3a0;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 12px;
    }
    #cortex-view-section .cx-mirror-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 6px 16px;
      font-size: 0.78rem;
    }
    #cortex-view-section .cx-mirror-key {
      color: var(--cx-muted);
      text-transform: uppercase;
      font-size: 0.66rem;
      letter-spacing: 0.05em;
      align-self: center;
    }
    #cortex-view-section .cx-mirror-val {
      color: var(--text, #fff);
      word-break: break-word;
      font-variant-numeric: tabular-nums;
    }
    #cortex-view-section .cx-mirror-val.warn {
      color: #e3b341;
    }

    /* Recent gbrain writes feed ----------------------------------------- */
    #cortex-view-section .cx-recent-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #cortex-view-section .cx-recent-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 4px;
      border-bottom: 1px solid var(--cx-border);
    }
    #cortex-view-section .cx-recent-row:last-child {
      border-bottom: none;
    }
    #cortex-view-section .cx-recent-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }
    #cortex-view-section .cx-recent-title-text {
      font-size: 0.8rem;
      color: var(--text, #fff);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #cortex-view-section .cx-recent-time {
      flex: none;
      font-size: 0.72rem;
      color: var(--cx-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* Workspace memory stats (absorbed Memory tab) ---------------------- */
    #cortex-view-section .memory-view-error {
      color: #f8a3a0;
      font-size: 0.78rem;
      margin-bottom: 8px;
    }
    #cortex-view-section .cx-ws-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      font-size: 0.78rem;
      color: var(--cx-muted);
      margin-bottom: 4px;
    }
    #cortex-view-section .cx-ws-stat b {
      color: var(--text, #fff);
      font-weight: 700;
    }
    #cortex-view-section .cx-ws-recent-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--cx-muted);
      margin: 14px 0 8px;
    }
    #cortex-view-section .cx-ws-files {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #cortex-view-section .cx-ws-file {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 4px;
      border-bottom: 1px solid var(--cx-border);
      font-size: 0.78rem;
    }
    #cortex-view-section .cx-ws-file:last-child {
      border-bottom: none;
    }
    #cortex-view-section .cx-ws-type {
      flex: none;
      font-size: 0.68rem;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    #cortex-view-section .cx-ws-type.daily {
      color: var(--cx-accent);
      background: rgba(0, 255, 102, 0.1);
    }
    #cortex-view-section .cx-ws-type.state {
      color: var(--cx-accent-2);
      background: rgba(13, 245, 227, 0.1);
    }
    #cortex-view-section .cx-ws-name {
      flex: 1;
      min-width: 0;
      color: var(--text, #fff);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #cortex-view-section .cx-ws-size,
    #cortex-view-section .cx-ws-age {
      flex: none;
      color: var(--cx-muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
  </style>

  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">🧩</span>
        <span data-i18n="views.cortex.title">Cortex</span>
      </div>
      <div class="view-subtitle" data-i18n="views.cortex.subtitle">
        Shared knowledge base the whole fleet can read and write — gbrain health,
        Obsidian mirror, and workspace memory
      </div>
    </div>

    <!-- Availability strip -->
    <div class="cx-avail-strip" id="cx-availability">
      <span class="cx-avail-item">
        <span class="cx-avail-dot" data-avail="memory"></span>
        <span class="cx-avail-label" data-i18n="views.cortex.availMemory">Memory</span>
        <span class="cx-avail-state" data-avail-state="memory" data-i18n="views.cortex.checking"
          >checking…</span
        >
      </span>
      <span class="cx-avail-item">
        <span class="cx-avail-dot" data-avail="gauges"></span>
        <span class="cx-avail-label" data-i18n="views.cortex.availGauges">Gauges</span>
        <span class="cx-avail-state" data-avail-state="gauges" data-i18n="views.cortex.checking"
          >checking…</span
        >
      </span>
    </div>

    <!-- gbrain health badge (status + page/chunk/embedded-coverage stats) -->
    <div class="cx-health" id="cx-health" style="display: none"></div>

    <!-- Active context engine strip -->
    <div class="cx-engine-strip" id="cx-engine-strip" style="display: none"></div>

    <!-- Engine date-window control: scopes the gauge figures below to a
         rolling window or an explicit from/to range. "All" = lifetime totals
         (the default), which leaves the original no-filter behavior intact. -->
    <div class="cx-engine-window" id="cx-engine-window">
      <div class="filter-group" id="cx-window-tabs">
        <span class="filter-label" data-i18n="views.cortex.engineWindowLabel">Engine window:</span>
        <button class="filter-btn" data-window="24h" type="button">24h</button>
        <button class="filter-btn" data-window="7d" type="button">7d</button>
        <button class="filter-btn" data-window="30d" type="button">30d</button>
        <button
          class="filter-btn active"
          data-window="all"
          type="button"
          data-i18n="views.cortex.engineWindowAll"
        >
          All
        </button>
      </div>
      <div class="cx-window-range" id="cx-window-range">
        <label
          class="cx-window-range-label"
          for="cx-window-from"
          data-i18n="views.cortex.engineWindowFrom"
          >From</label
        >
        <input type="date" class="cx-window-date" id="cx-window-from" />
        <label
          class="cx-window-range-label"
          for="cx-window-to"
          data-i18n="views.cortex.engineWindowTo"
          >To</label
        >
        <input type="date" class="cx-window-date" id="cx-window-to" />
        <button
          class="filter-btn"
          id="cx-window-apply"
          type="button"
          data-i18n="views.cortex.engineWindowApply"
        >
          Apply range
        </button>
        <button
          class="filter-btn"
          id="cx-window-clear"
          type="button"
          data-i18n="views.cortex.engineWindowClear"
        >
          Clear
        </button>
      </div>
      <span class="cx-window-status" id="cx-window-status"></span>
    </div>

    <!-- Per-engine gauge cards -->
    <div class="cx-gauges" id="cx-gauges">
      <div class="cx-loading" data-i18n="views.cortex.loadingGauges">
        Loading compression gauges…
      </div>
    </div>

    <div class="cx-grid">
      <!-- Obsidian ↔ gbrain mirror health sub-panel -->
      <div class="cx-card" id="cx-obsidian" style="display: none"></div>

      <!-- Recent gbrain writes feed -->
      <div class="cx-card" id="cx-recent" style="display: none"></div>

      <!-- Workspace memory stats (absorbed Memory tab; data from /api/memory) -->
      <div class="cx-card" id="cx-workspace-card">
        <div class="memory-view-error" id="cx-workspace-error" style="display: none"></div>
        <div id="cx-workspace"></div>
      </div>

      <!-- Memory browser (read-only gbrain page browser) -->
      <div class="cx-card" id="cx-memory-card">
        <div class="cx-card-title">
          <span data-i18n="views.cortex.memoryCardTitle">gbrain pages</span>
          <span class="hint" id="cx-memory-stats"></span>
        </div>
        <div id="cx-memory-body">
          <input
            type="search"
            class="cx-mem-search"
            id="cx-memory-search"
            placeholder="Search gbrain pages… (empty lists all)"
            data-i18n-placeholder="views.cortex.searchPlaceholder"
            autocomplete="off"
          />
          <div class="cx-mem-status" id="cx-memory-status" data-i18n="views.cortex.loadingMemories">
            Loading pages…
          </div>
          <div class="cx-mem-list" id="cx-memory-list"></div>
        </div>
        <div id="cx-memory-offline" style="display: none"></div>
      </div>
    </div>
  </section>
</div>
