<!-- Operators View Partial -->
<div class="section" id="operators-view-section">
  <style>
    #operators-view-section [hidden] {
      display: none !important;
    }
    #operators-view-section .operators-view-error {
      color: var(--red);
      font-size: 0.8rem;
      margin-bottom: 8px;
    }
    #operators-view-section .operators-role-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
      background: var(--bg);
      color: var(--text-muted);
    }
    #operators-view-section .operators-role-badge.owner {
      color: #ffd700;
      background: rgba(255, 215, 0, 0.12);
    }
    #operators-view-section .operators-role-badge.admin {
      color: #a371f7;
      background: rgba(163, 113, 247, 0.12);
    }
    #operators-view-section .operators-role-badge.user {
      color: var(--accent-2, #2dd4bf);
      background: rgba(45, 212, 191, 0.12);
    }
    #operators-view-section .operators-active-count.live {
      color: var(--green);
      font-weight: 700;
    }
    #operators-view-section .operators-detail-grid {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 16px;
      font-size: 0.78rem;
      margin-bottom: 10px;
    }
    #operators-view-section .operators-detail-grid dt {
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      align-self: center;
    }
    #operators-view-section .operators-detail-grid dd {
      margin: 0;
      color: var(--text);
      word-break: break-word;
    }
    #operators-view-section .operators-sessions-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin: 8px 0 4px;
    }
    #operators-view-section .operators-session-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 3px 0;
      font-size: 0.76rem;
      border-bottom: 1px solid var(--border);
    }
    #operators-view-section .operators-session-row .tokens {
      color: var(--text-muted);
      white-space: nowrap;
    }
    #operators-view-section .operators-legend {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 14px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    #operators-view-section .operators-legend .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
  <section class="view-panel">
    <div class="view-header">
      <div class="view-title">
        <span class="view-icon">👥</span>
        <span data-i18n="views.operators.title">Operators</span>
        <span class="section-count" id="operators-view-count">0</span>
      </div>
      <div class="view-subtitle" data-i18n="views.operators.subtitle">
        Auto-detected operators — role, sessions, token usage
      </div>
    </div>

    <div class="operators-view-error" id="operators-view-error" hidden></div>

    <div id="operators-view-list"></div>

    <div class="operators-legend">
      <span
        ><span class="dot" style="background: linear-gradient(135deg, #ffd700, #ff8c00)"></span
        ><strong>Owner</strong> —
        <span data-i18n="views.operators.legendOwner">Full control</span></span
      >
      <span
        ><span class="dot" style="background: linear-gradient(135deg, #a371f7, #8957e5)"></span
        ><strong>Admin</strong> —
        <span data-i18n="views.operators.legendAdmin">Manage users &amp; settings</span></span
      >
      <span
        ><span class="dot" style="background: linear-gradient(135deg, #2dd4bf, #09b3a6)"></span
        ><strong>User</strong> —
        <span data-i18n="views.operators.legendUser">Dashboard access</span></span
      >
    </div>
  </section>
</div>
